<ion-header translucent>

</ion-header>
<ion-content>
  <ion-list class="ion-no-padding">
    <ion-list-header>
      <ion-item class="ion-margin-top list-header-item" lines="none" tappable>
        {{"SORT_ORDER" | translate}}
      </ion-item>
    </ion-list-header>
    <ion-grid class="ion-no-padding">
      <ion-row>
        <ion-col size="6">
          <ion-item (click)="setSortOrder(preparationSortOrderEnum.ASCENDING)" [class.active]="isOrderActive(preparationSortOrderEnum.ASCENDING)" lines="none" tappable>
            <ion-icon name="beanconqueror-order-asc" slot="start"></ion-icon>
            <ion-label>{{"ASCENDING" | translate}}</ion-label>
          </ion-item>

        </ion-col>
        <ion-col size="6">
          <ion-item (click)="setSortOrder(preparationSortOrderEnum.DESCENDING)" [class.active]="isOrderActive(preparationSortOrderEnum.DESCENDING)" lines="none" tappable>
            <ion-icon name="beanconqueror-order-desc" slot="start"></ion-icon>
            <ion-label>{{"DESCENDING" | translate}}</ion-label>
          </ion-item>

        </ion-col>
      </ion-row>
    </ion-grid>
    <ion-list-header>
      <ion-item class="ion-margin-top list-header-item" lines="none" tappable>
        {{"SORT_AFTER" | translate}}
      </ion-item>
    </ion-list-header>
    <ion-item (click)="setSortAfter(preparationSortAfterEnum.NAME)" [class.active]="isSortActive(preparationSortAfterEnum.NAME)" lines="none" tappable>
      <ion-icon name="beanconqueror-filter-aa" slot="start"></ion-icon>
      <ion-label>{{"PREPARATION_SORT_NAME" | translate}}</ion-label>
    </ion-item>
    <ion-item (click)="setSortAfter(preparationSortAfterEnum.TYPE)" [class.active]="isSortActive(preparationSortAfterEnum.TYPE)" class="ion-margin-top" lines="none" tappable>
      <ion-icon name="beanconqueror-preparation" slot="start"></ion-icon>
      <ion-label>{{"PREPARATION_SORT_TYPE" | translate}}</ion-label>
    </ion-item>
  </ion-list>
  <ion-list class="ion-no-padding ion-padding-top">
    <ion-button class="ion-margin-horizontal" (click)="useFilter()" color="accent" expand="block" tappable
    type="submit">{{"USE_FILTER" | translate}}</ion-button>

    <ion-button class="ion-margin-horizontal" (click)="resetFilter()" color="dark" expand="block" fill="clear"
    tappable>{{"RESET_FILTER" | translate}}</ion-button>
  </ion-list>
</ion-content>
