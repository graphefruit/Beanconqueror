name: npm test CI

on:
  push:
    branches: ['master', 'develop']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - uses: actions/setup-node@v4
        with:
          node-version: 22 
          cache: 'npm'

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run Tests with Coverage
        # Importante: Usamos --no-watch para asegurar que el proceso termine
        run: npm test -- --code-coverage --no-watch --browsers=ChromeHeadlessNoSandbox

      - name: SonarCloud Scan
        # Actualizado a la versión v3 para evitar errores de compatibilidad (Error 3)
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=luuciarr06_Beanconqueror
            -Dsonar.organization=lricrui
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=**/lcov.info
            -Dsonar.exclusions=src/main.ts,src/polyfills.ts,src/test.ts,src/zone-flags.ts,src/app/**,src/components/**,src/popover/**,src/services/**,src/directive/**,src/enums/**,src/interfaces/**,src/models/**,src/native/**,src/generated/**,src/assets/**,src/environments/**,src/store_screens/**,src/classes/angular/**,src/classes/appEvent/**,src/classes/bean/**,src/classes/brew/**,src/classes/devices/**,src/classes/graph/**,src/classes/preparation/**,src/classes/preparationDevice/**,src/classes/roasting-machine/**,src/classes/server/**,src/classes/settings/**,src/classes/version/**,src/classes/storageClass.ts
            -Dsonar.coverage.exclusions=**/*.spec.ts
            -Dsonar.projectBaseDir=.
