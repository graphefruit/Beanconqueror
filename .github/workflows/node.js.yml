name: npm test CI

on:
  push:
    branches: ['master', 'develop']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - uses: actions/setup-node@v4
        with:
          node-version: 22 
          cache: 'npm'

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run Tests with Coverage
        # Importante: Usamos --no-watch para asegurar que el proceso termine
        run: npm test -- --code-coverage --no-watch --browsers=ChromeHeadlessNoSandbox

      - name: SonarCloud Scan
        # Actualizado a la versión v3 para evitar errores de compatibilidad (Error 3)
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=luuciarr06_beanconqueror
            -Dsonar.organization=luuciarr06
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,src/generated/**
