name: npm test CI

on:
  push:
    branches: ['master', 'develop']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Importante para que SonarCloud analice el histórico

      - uses: actions/setup-node@v4 # Nota: La versión estable actual es v4
        with:
          node-version: 22 # Node 24 es experimental; 22 es la LTS actual más estable
          cache: 'npm'

      - run: npm install -g 'npm@^11.8.0' && npm -v
      
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run Tests with Coverage
        # Ejecutamos antes de SonarScanner y generamos el reporte LCOV
        run: npm run test -- --code-coverage --watch=false --browsers=ChromeHeadlessNoSandbox

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=TU_PROJECT_KEY
            -Dsonar.organization=TU_ORGANIZACION
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.exclusions=**/node_modules/**,src/generated/**
